<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大鱼吃小鱼 - Big Fish Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- 开始界面 -->
        <div id="start-screen" class="overlay">
            <h1>大鱼吃小鱼</h1>
            <p>控制小鱼游动，吃掉比你小的鱼来成长！</p>
            <p>避开比你大的鱼，否则游戏结束。</p>
            <p>操作：使用 <b>WASD</b> 或 <b>方向键</b> 移动</p>
            <button id="start-button">开始游戏</button>
        </div>

        <!-- 游戏结束界面 -->
        <div id="game-over-screen" class="overlay hidden">
            <h1>游戏结束</h1>
            <p>最终得分: <span id="final-score">0</span></p>
            <p>最终体型: <span id="final-size">0</span></p>
            <button id="restart-button">重新开始</button>
        </div>

        <!-- 得分显示 -->
        <div id="hud" class="hidden">
            <div class="stat">得分: <span id="current-score">0</span></div>
            <div class="stat">体型: <span id="current-size">1.0</span>x</div>
        </div>
    </div>
    <script src="js/game.js"></script>
</body>
</html>
